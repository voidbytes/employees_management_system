<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>职工信息管理系统 - 登录</title>
    <link rel="stylesheet" href="/static/css/layui.css">
    <style>
        .login-box {
            width: 400px;
            margin: 150px auto;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .login-box h2 {
            text-align: center;
            color: #333;
        }
        .login-box hr {
            margin: 20px 0;
        }
        .login-tip {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }
        .error-msg {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>👔 职工信息管理系统</h2>
        <hr>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form class="layui-form" action="/login" method="post">
            <div class="layui-form-item">
                <label class="layui-form-label">账号</label>
                <div class="layui-input-block">
                    <input type="text" name="username" required placeholder="请输入账号" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">密码</label>
                <div class="layui-input-block">
                    <input type="password" name="password" required placeholder="请输入密码" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block" style="text-align:center;">
                    <button class="layui-btn" lay-submit>登录</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
        <div class="login-tip">管理员：admin/admin123 &nbsp;|&nbsp; 普通员工：user/user123</div>
    </div>
    <script src="/static/layui.all.js"></script>
</body>
</html>
